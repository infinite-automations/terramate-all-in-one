name: "Test new action"

on:
  push:

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: jessehouwing/actions-semver-checker@main
        with:
          check-minor-version: false
